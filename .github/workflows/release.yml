name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-14
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            EXT=".exe"
          else
            EXT=""
          fi

          OUTPUT_NAME="manga-manager-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "output_name=${OUTPUT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build server binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          go build \
            -ldflags="-s -w -X 'main.Version=${{ steps.meta.outputs.version }}' -X 'main.Commit=${GITHUB_SHA}' -X 'main.BuildTime=${BUILD_TIME}'" \
            -o "build/${{ steps.meta.outputs.output_name }}" \
            ./cmd/server

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.output_name }}
          path: build/${{ steps.meta.outputs.output_name }}
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
