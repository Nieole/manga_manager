name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-14 # darwin/arm64 is a released target — exercise it on PRs (CGO + WebP + path handling)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Test frontend
        working-directory: web
        run: npm run test

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run go vet
        run: go vet ./...

      - name: Lint Go (golangci-lint)
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2

      - name: Scan Go dependencies for vulnerabilities (govulncheck)
        if: matrix.os == 'ubuntu-latest'
        # Fails the build on any known CVE reachable from our code (x/image decode paths etc.).
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Go tests
        run: go test ./...

      - name: Run Go tests with race detector
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./...

      - name: Verify sqlc generated code is up to date
        if: matrix.os == 'ubuntu-latest'
        # sqlc v1.31.1 需 Go >= 1.26 才能构建，而本作业固定用 Go 1.25 且 setup-go 设了 GOTOOLCHAIN=local。
        # 仅在本步放开为 auto，让 go install 自动拉取构建 sqlc 所需的更新工具链（不影响其余步骤的 1.25 构建）。
        env:
          GOTOOLCHAIN: auto
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code -- internal/database
        # sqlc 在 stderr 输出的 "mismatched input" 为非致命诊断，Linux 下退出码 0；
        # 若生成产物与仓库不一致（drift）则 git diff 失败，CI 报错。

      - name: Verify generated TS contract types are up to date
        if: matrix.os == 'ubuntu-latest'
        # cmd/tsgen 以 Go 后端响应结构体为单一事实源生成 web/src/api/generated.ts（M47）。
        # 若源结构体改了却没重新生成，git diff 失败、CI 报错，防止手写/生成类型与后端漂移。
        run: |
          go run ./cmd/tsgen
          git diff --exit-code -- web/src/api/generated.ts

      - name: Verify server build
        # WebP encoding (chai2010/webp) requires CGO; make it explicit rather than relying on the
        # runner image default so a WebP-less binary can never be produced unnoticed.
        env:
          CGO_ENABLED: "1"
        run: go build -o build/manga-manager-ci ./cmd/server
