# Manga Manager 配置模板 / configuration template
#
# 用法：复制为 config.yaml 后按需修改（config.yaml 已被 .gitignore 忽略，不会入库）。
#   cp config.example.yaml config.yaml
# Usage: copy to config.yaml and edit as needed (config.yaml is gitignored).
#
# 首次启动时若 config.yaml 不存在，程序也会自动在工作目录生成一份默认配置。
# 本文件仅作为字段结构与默认值的参考，请勿在此填入真实密钥。

server:
    host: 0.0.0.0
    port: 8080
    allowed_origins:
        - http://*
        - https://*
database:
    path: ./data/manga.db
library:
    paths: []
    storage_profile: auto
    io_policy:
        scan_concurrency: 0
        archive_open_concurrency: 0
        cover_concurrency: 0
        hash_concurrency: 0
        pause_background_when_reading: false
        idle_only_heavy_tasks: false
        disable_same_disk_page_cache: false
    storage_policies: []
cache:
    dir: ./data/cache
    page_disk_cache_enabled: false
scanner:
    workers: 0
    scan_profile: metadata_scan
    thumbnail_format: webp
    waifu2x_path: ""
    realcugan_path: ""
    archive_pool_size: 5
    max_ai_concurrency: 3
ollama:
    endpoint: ""
    model: ""
llm:
    provider: ollama
    api_mode: ""
    base_url: http://localhost:11434
    request_path: ""
    endpoint: http://localhost:11434
    model: qwen2.5
    api_key: ""        # 切勿把真实密钥提交到版本库 / never commit a real API key
    timeout: 120
scrapers:
    # AniList / MangaDex 免密钥，无需配置。
    # MyAnimeList 需要 Client ID，Comic Vine 需要 API Key；留空则对应刮削源不可用。
    mal_client_id: ""       # 切勿把真实凭据提交到版本库 / never commit a real credential
    comicvine_api_key: ""   # 切勿把真实密钥提交到版本库 / never commit a real API key
protocols:
    opds:
        enabled: false
    mihon:
        enabled: false
koreader:
    enabled: false
    base_path: /koreader
    allow_registration: false
    match_mode: binary_hash
    path_ignore_extension: false
