server:
    host: 0.0.0.0
    port: 8080
    allowed_origins:
        - http://*
        - https://*
database:
    path: ./data/manga.db
library:
    paths: []
    storage_profile: auto
    io_policy:
        scan_concurrency: 0
        archive_open_concurrency: 0
        cover_concurrency: 0
        hash_concurrency: 0
        pause_background_when_reading: false
        idle_only_heavy_tasks: false
        disable_same_disk_page_cache: false
    storage_policies: []
cache:
    dir: ./data/cache
    page_disk_cache_enabled: false
scanner:
    workers: 0
    scan_profile: metadata_scan
    thumbnail_format: webp
    waifu2x_path: ""
    realcugan_path: ""
    archive_pool_size: 5
    max_ai_concurrency: 3
ollama:
    endpoint: ""
    model: ""
llm:
    provider: ollama
    api_mode: ""
    base_url: http://localhost:11434
    request_path: ""
    endpoint: http://localhost:11434
    model: qwen2.5
    api_key: ""
    timeout: 120
protocols:
    opds:
        enabled: false
    mihon:
        enabled: false
koreader:
    enabled: false
    base_path: /koreader
    allow_registration: false
    match_mode: binary_hash
    path_ignore_extension: false
